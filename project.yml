name: AIMDReader
options:
  bundleIdPrefix: com.aimd
  deploymentTarget:
    macOS: "15.0"
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "3.0"
    CURRENT_PROJECT_VERSION: "6"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"

localPackages:
  - Packages/aimdRenderer

targets:
  AIMDReaderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AIMDReaderTests
    settings:
      base:
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        GENERATE_INFOPLIST_FILE: YES

  AIMDReader:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Welcome
        type: folder
        buildPhase: resources
      - path: Resources/ACKNOWLEDGMENTS.md
        buildPhase: resources
    dependencies:
      - package: aimdRenderer
    settings:
      base:
        PRODUCT_NAME: Pixley Markdown
        PRODUCT_BUNDLE_IDENTIFIER: com.aimd.reader
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "15.0"
      configs:
        Debug:
          ARCHS: arm64
          ONLY_ACTIVE_ARCH: YES
        Release:
          ARCHS: [arm64, x86_64]
          ONLY_ACTIVE_ARCH: NO
    entitlements:
      path: Resources/AIMDReader.entitlements

  AIMDReader-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "MarkdownEditor.swift"
          - "MarkdownEditorCoordinator.swift"
          - "MarkdownHighlighter.swift"
          - "MarkdownTextViewNavigation.swift"
          - "MarkdownTextViewPopovers.swift"
          - "PopoverControllers.swift"
          - "GutterOverlayView.swift"
          - "InteractiveAnnotator.swift"
          - "Views/Components/LineNumberRulerView.swift"
          - "Views/Components/OutlineFileList.swift"
          - "Services/FolderWatcher.swift"
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Welcome
        type: folder
        buildPhase: resources
      - path: Resources/ACKNOWLEDGMENTS.md
        buildPhase: resources
    dependencies:
      - package: aimdRenderer
    settings:
      base:
        PRODUCT_NAME: Pixley Markdown
        PRODUCT_BUNDLE_IDENTIFIER: com.aimd.reader.ios
        INFOPLIST_FILE: Resources/Info-iOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    entitlements:
      path: Resources/AIMDReader-iOS.entitlements
      properties:
        com.apple.security.app-sandbox: true

schemes:
  AIMDReader:
    build:
      targets:
        AIMDReader: all
        AIMDReaderTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AIMDReaderTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  AIMDReader-iOS:
    build:
      targets:
        AIMDReader-iOS: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
