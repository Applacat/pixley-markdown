name: AIMDReader
options:
  bundleIdPrefix: com.aimd
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "3.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: [arm64]
    ONLY_ACTIVE_ARCH: NO
    SWIFT_VERSION: "6.0"

localPackages:
  - Packages/aimdRenderer

targets:
  AIMDReaderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AIMDReaderTests
    settings:
      base:
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        GENERATE_INFOPLIST_FILE: YES

  AIMDReader:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Welcome
        type: folder
        buildPhase: resources
      - path: Resources/ACKNOWLEDGMENTS.md
        buildPhase: resources
      - path: Resources/Products.storekit
        buildPhase: none
    dependencies:
      - package: aimdRenderer
    settings:
      base:
        PRODUCT_NAME: Pixley Markdown
        PRODUCT_BUNDLE_IDENTIFIER: com.aimd.reader
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Pixley Markdown
        CFBundleDisplayName: Pixley Markdown
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.productivity
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.markdown
          - CFBundleTypeName: Folder
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.folder
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
    entitlements:
      path: Resources/AIMDReader.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true

schemes:
  AIMDReader:
    build:
      targets:
        AIMDReader: all
        AIMDReaderTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Resources/Products.storekit
    test:
      config: Debug
      targets:
        - AIMDReaderTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
